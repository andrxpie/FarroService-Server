# fly.toml — FarroService backend (ASP.NET Core 10)
# Docs: https://fly.io/docs/reference/configuration/

app = "farro-service-api"
primary_region = "waw"

[build]
  dockerfile = "Dockerfile"

[env]
  ASPNETCORE_ENVIRONMENT = "Production"
  # PORT is also injected by Fly; kept here as an explicit default.
  PORT = "8080"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  # Keep at least one machine warm — stability over cost for the diploma defense.
  min_machines_running = 1

  [[http_service.checks]]
    interval = "15s"
    timeout = "3s"
    grace_period = "20s"
    method = "GET"
    path = "/health"

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"
